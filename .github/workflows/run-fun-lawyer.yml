name: Run Fun Lawyer Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "12 * * * *"

permissions:
  contents: write

concurrency:
  group: fun-lawyer-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      APP_DB_PATH: state/fun_lawyer.db
      APP_STORAGE_DIR: state/storage
      APP_PUBLIC_MEDIA_BASE_URL: ${{ secrets.APP_PUBLIC_MEDIA_BASE_URL != '' && secrets.APP_PUBLIC_MEDIA_BASE_URL || format('https://raw.githubusercontent.com/{0}/main/state/storage', github.repository) }}
      YOUTUBE_CHANNEL_HANDLE: "@lawfun_official"
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_ARTICLE_MODEL: ${{ secrets.OPENAI_ARTICLE_MODEL != '' && secrets.OPENAI_ARTICLE_MODEL || 'gpt-5' }}
      OPENAI_QA_MODEL: ${{ secrets.OPENAI_QA_MODEL != '' && secrets.OPENAI_QA_MODEL || 'gpt-5-mini' }}
      OPENAI_TRANSCRIBE_MODEL: ${{ secrets.OPENAI_TRANSCRIBE_MODEL != '' && secrets.OPENAI_TRANSCRIBE_MODEL || 'gpt-4o-transcribe' }}
      LOCAL_TRANSCRIBE_MODEL: ${{ secrets.LOCAL_TRANSCRIBE_MODEL != '' && secrets.LOCAL_TRANSCRIBE_MODEL || 'small' }}
      LOCAL_TRANSCRIBE_COMPUTE_TYPE: ${{ secrets.LOCAL_TRANSCRIBE_COMPUTE_TYPE != '' && secrets.LOCAL_TRANSCRIBE_COMPUTE_TYPE || 'int8' }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . yt-dlp faster-whisper

      - name: Cache local transcription models
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/whisper
          key: fun-lawyer-whisper-${{ runner.os }}-${{ env.LOCAL_TRANSCRIBE_MODEL }}
          restore-keys: |
            fun-lawyer-whisper-${{ runner.os }}-

      - name: Validate secrets
        run: |
          test -n "$YOUTUBE_API_KEY" || { echo "::error::YOUTUBE_API_KEY secret is missing"; exit 1; }
          test -n "$TEAMS_WEBHOOK_URL" || { echo "::error::TEAMS_WEBHOOK_URL secret is missing"; exit 1; }

      - name: Prepare tracked state directory
        run: |
          mkdir -p state/storage

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Scan YouTube and build article packages
        run: |
          fun-lawyer scan-youtube --max-results 5
          fun-lawyer run-stage transcript
          fun-lawyer run-stage article
          fun-lawyer show-status

      - name: Commit generated state before Teams publish
        run: |
          if [ -z "$(git status --porcelain -- state)" ]; then
            echo "No state changes before publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state
          git commit -m "Update Fun Lawyer state before publish"
          git push origin HEAD:main

      - name: Publish approved articles to Teams
        run: |
          fun-lawyer run-stage publish
          fun-lawyer show-status

      - name: Commit delivery logs
        run: |
          if [ -z "$(git status --porcelain -- state)" ]; then
            echo "No state changes after publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state
          git commit -m "Update Fun Lawyer delivery logs"
          git push origin HEAD:main
